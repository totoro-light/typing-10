<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#FFE566"/>

  <!-- Keyboard body -->
  <rect x="8" y="20" width="48" height="28" rx="5" fill="#1a1a2e"/>

  <!-- Top row keys (3 keys) -->
  <rect x="13" y="25" width="9" height="7" rx="2" fill="#FFE566"/>
  <rect x="27" y="25" width="9" height="7" rx="2" fill="#FFE566"/>
  <rect x="41" y="25" width="9" height="7" rx="2" fill="#FFE566"/>

  <!-- Home row keys (3 keys) - highlight middle one -->
  <rect x="13" y="35" width="9" height="7" rx="2" fill="#FFE566" opacity="0.5"/>
  <rect x="27" y="35" width="9" height="7" rx="2" fill="#e94560"/>
  <rect x="41" y="35" width="9" height="7" rx="2" fill="#FFE566" opacity="0.5"/>
</svg>
